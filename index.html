<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>iMessage Chat</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js"></script>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f2f2f7;
    height: 100vh;
    overflow: hidden;
    display: flex;
}

/* LEFT SIDEBAR — CONTACTS */
#sidebar {
    width: 320px;
    background: #ffffff;
    border-right: 1px solid #d1d1d6;
    display: flex;
    flex-direction: column;
}

#profile {
    padding: 20px;
    border-bottom: 1px solid #e5e5ea;
}

#profile input {
    width: 100%;
    padding: 8px 10px;
    border-radius: 12px;
    border: 1px solid #c7c7cc;
    font-size: 15px;
}

#contacts {
    overflow-y: auto;
    flex: 1;
}

.contact {
    padding: 15px;
    cursor: pointer;
    border-bottom: 1px solid #f0f0f5;
}

.contact:hover {
    background: #f7f7f7;
}

.contact-name {
    font-size: 16px;
    font-weight: 500;
}

/* CHAT AREA */
#chatArea {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #e5e5ea;
}

#chatHeader {
    height: 60px;
    display: flex;
    align-items: center;
    padding: 0 20px;
    font-size: 20px;
    font-weight: 600;
    background: #ffffff99;
    backdrop-filter: blur(10px);
    border-bottom: 1px solid #d1d1d6;
}

#messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
}

/* BUBBLES */
.message {
    max-width: 70%;
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 16px;
    line-height: 1.35;
    word-wrap: break-word;
}

.me {
    align-self: flex-end;
    background: #0078ff;
    color: white;
    border-bottom-right-radius: 4px;
}

.them {
    align-self: flex-start;
    background: #e9e9eb;
    color: black;
    border-bottom-left-radius: 4px;
}

/* INPUT AREA */
#inputArea {
    display: flex;
    padding: 15px;
    gap: 10px;
    background: #ffffff;
    border-top: 1px solid #d1d1d6;
}

#messageInput {
    flex: 1;
    padding: 12px 14px;
    border-radius: 20px;
    border: 1px solid #c7c7cc;
    font-size: 16px;
}

#sendButton {
    padding: 10px 18px;
    background: #0078ff;
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 16px;
    cursor: pointer;
}
#sendButton:hover {
    background: #0066d6;
}

</style>
</head>
<body>

<!-- LEFT SIDEBAR -->
<div id="sidebar">
    <div id="profile">
        <div style="font-weight:600;margin-bottom:6px;">Your Username</div>
        <input id="usernameInput" placeholder="Enter username">
    </div>

    <div id="contacts"></div>
</div>

<!-- CHAT AREA -->
<div id="chatArea">
    <div id="chatHeader">Global Chat</div>
    <div id="messages"></div>

    <div id="inputArea">
        <input id="messageInput" placeholder="Message...">
        <button id="sendButton">Send</button>
    </div>
</div>


<script>
// ---------- FIREBASE SETUP ----------
const firebaseConfig = {
    apiKey: "AIzaSyA8JyrfvNxf-l3dml5YoQouCmwsZwmhx8Q",
    authDomain: "chatbase-a68ee.firebaseapp.com",
    projectId: "chatbase-a68ee",
    storageBucket: "chatbase-a68ee.firebasestorage.app",
    messagingSenderId: "353773816946",
    appId: "1:353773816946:web:38d815c3e92ce6156b06eb",
    measurementId: "G-3D5QB7B2G3"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ---------- USER DATA ----------
let userId = localStorage.getItem("friendID");
if (!userId) {
    userId = "user-" + Math.random().toString(36).substring(2, 10);
    localStorage.setItem("friendID", userId);
}

let username = localStorage.getItem("username") || "Guest";
document.getElementById("usernameInput").value = username;

document.getElementById("usernameInput").addEventListener("change", () => {
    username = document.getElementById("usernameInput").value;
    localStorage.setItem("username", username);
});

// ---------- CONTACT LIST ----------
const contactsDiv = document.getElementById("contacts");

// “GLOBAL” is always the first chat
contactsDiv.innerHTML = `
    <div class="contact" onclick="openChat('global')">
        <div class="contact-name">🌍 Global Chat</div>
    </div>
`;

let currentChat = "global";

// ---------- CHAT SWITCHER ----------
function openChat(chatId) {
    currentChat = chatId;
    document.getElementById("chatHeader").textContent =
        chatId === "global" ? "Global Chat" : "Chat with " + chatId;

    loadMessages();
}

// ---------- SEND MESSAGE ----------
document.getElementById("sendButton").addEventListener("click", sendMessage);

document.getElementById("messageInput").addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
        e.preventDefault();
        sendMessage();
    }
});

function sendMessage() {
    const text = document.getElementById("messageInput").value.trim();
    if (!text) return;

    db.collection("chats")
        .doc(currentChat)
        .collection("messages")
        .add({
            text,
            username,
            sender: userId,
            timestamp: Date.now()
        });

    document.getElementById("messageInput").value = "";
}

// ---------- LOAD MESSAGES ----------
function loadMessages() {
    const msgDiv = document.getElementById("messages");
    msgDiv.innerHTML = "";

    db.collection("chats")
        .doc(currentChat)
        .collection("messages")
        .orderBy("timestamp")
        .onSnapshot(snapshot => {
            msgDiv.innerHTML = "";

            snapshot.forEach(doc => {
                const msg = doc.data();

                const bubble = document.createElement("div");
                bubble.classList.add("message");

                bubble.classList.add(
                    msg.sender === userId ? "me" : "them"
                );

                bubble.textContent = msg.text;
                msgDiv.appendChild(bubble);
            });

            msgDiv.scrollTop = msgDiv.scrollHeight;
        });
}

// Load global chat on start
loadMessages();
</script>

</body>
</html>
