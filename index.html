<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ChatBase iMessage</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  height: 100vh;
  display: flex;
  background: #f2f2f7;
}

/* ----- SIDEBAR ----- */
#sidebar {
  width: 320px;
  background: #fff;
  border-right: 1px solid #ddd;
  display: flex;
  flex-direction: column;
}

#profile {
  padding: 20px;
  display: flex;
  align-items: center;
  border-bottom: 1px solid #eee;
}

#profile img {
  width: 55px;
  height: 55px;
  border-radius: 50%;
  margin-right: 12px;
}

#editProfile {
  margin-top: 5px;
  font-size: 13px;
  color: #0a84ff;
  cursor: pointer;
}

#contacts {
  flex: 1;
  overflow-y: auto;
}

.contact {
  padding: 16px;
  display: flex;
  align-items: center;
  cursor: pointer;
  border-bottom: 1px solid #f4f4f4;
}

.contact:hover {
  background: #f0f0f0;
}

.contact img {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  margin-right: 12px;
}

/* ----- CHAT AREA ----- */
#chat {
  flex: 1;
  display: flex;
  flex-direction: column;
}

#chatHeader {
  padding: 15px;
  background: white;
  border-bottom: 1px solid #ddd;
  font-size: 20px;
  font-weight: 600;
}

#messages {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
}

/* message bubbles */
.message {
  max-width: 70%;
  padding: 10px 14px;
  margin-bottom: 12px;
  border-radius: 18px;
  font-size: 15px;
  line-height: 1.3;
}

.mine {
  background: #0a84ff;
  color: white;
  margin-left: auto;
}

.theirs {
  background: #e5e5ea;
  color: black;
  margin-right: auto;
}

/* typing indicator */
#typingIndicator {
  margin: 10px 0;
  color: #555;
  font-size: 14px;
  font-style: italic;
}

/* input bar */
#inputBar {
  display: flex;
  padding: 10px;
  background: white;
  border-top: 1px solid #ddd;
}

#messageInput {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: 1px solid #ccc;
}

#sendBtn {
  margin-left: 10px;
  padding: 10px 16px;
  background: #0a84ff;
  border: none;
  border-radius: 18px;
  color: white;
  cursor: pointer;
  font-weight: 600;
}

/* typing bubbles animation */
.typingBubble {
  width: 6px;
  height: 6px;
  background: #aaa;
  border-radius: 50%;
  display: inline-block;
  margin-right: 3px;
  animation: blink 1.4s infinite both;
}

.typingBubble:nth-child(2) {
  animation-delay: 0.2s;
}

.typingBubble:nth-child(3) {
  animation-delay: 0.4s;
}

@keyframes blink {
  0% { opacity: .2; }
  20% { opacity: 1; }
  100% { opacity: .2; }
}

</style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">

  <div id="profile">
    <img id="myAvatar" src="">
    <div>
      <div id="myName"></div>
      <small>ID: <span id="myId"></span></small>
      <div id="editProfile">Edit Profile</div>
    </div>
  </div>

  <div id="contacts">
    <!-- Global chat added in JS -->
  </div>

</div>

<!-- CHAT WINDOW -->
<div id="chat">
  <div id="chatHeader">Global Chat</div>
  <div id="messages"></div>

  <div id="typingIndicator"></div>

  <div id="inputBar">
    <input id="messageInput" placeholder="Message…" />
    <button id="sendBtn">Send</button>
  </div>
</div>



<!-- FIREBASE LOGIC -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.5.2/firebase-app.js";
import {
  getFirestore, doc, setDoc, updateDoc, getDoc, collection,
  addDoc, onSnapshot, query, orderBy, getDocs
} from "https://www.gstatic.com/firebasejs/10.5.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA8JyrfvNxf-l3dml5YoQouCmwsZwmhx8Q",
  authDomain: "chatbase-a68ee.firebaseapp.com",
  projectId: "chatbase-a68ee",
  storageBucket: "chatbase-a68ee.firebasestorage.app",
  messagingSenderId: "353773816946",
  appId: "1:353773816946:web:38d815c3e92ce6156b06eb",
  measurementId: "G-3D5QB7B2G3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ----- USER SETUP ----- */
let myId = localStorage.getItem("myId");
let myName = localStorage.getItem("myName");
let myAvatar = localStorage.getItem("myAvatar");

async function setupUser() {
  if (!myId) {
    myId = "user_" + Math.random().toString(36).substring(2, 9);
    localStorage.setItem("myId", myId);
  }
  if (!myName) {
    myName = prompt("Display name:") || "User";
    localStorage.setItem("myName", myName);
  }
  if (!myAvatar) {
    myAvatar = "https://placekitten.com/200/" + (200 + Math.floor(Math.random() * 40));
    localStorage.setItem("myAvatar", myAvatar);
  }

  await setDoc(doc(db, "users", myId), {
    userId: myId,
    name: myName,
    avatar: myAvatar,
    active: true,
    updatedAt: Date.now()
  }, { merge: true });

  document.getElementById("myId").innerText = myId;
  document.getElementById("myName").innerText = myName;
  document.getElementById("myAvatar").src = myAvatar;
}

await setupUser();

/* ---- EDIT PROFILE ---- */
document.getElementById("editProfile").onclick = async () => {
  const newName = prompt("New name:", myName);
  if (!newName) return;

  myName = newName;
  localStorage.setItem("myName", newName);
  document.getElementById("myName").innerText = newName;

  await updateDoc(doc(db, "users", myId), { name: newName });
};

/* ----- CONTACT LIST ----- */
async function loadContacts() {
  const contactsDiv = document.getElementById("contacts");

  contactsDiv.innerHTML = `
    <div class="contact" data-id="global">
      <img src="https://i.imgur.com/2WZtODx.png">
      🌐 Global Chat
    </div>
  `;

  const snap = await getDocs(collection(db, "users"));
  snap.forEach(u => {
    const data = u.data();
    if (data.userId === myId) return;

    const div = document.createElement("div");
    div.className = "contact";
    div.dataset.id = data.userId;
    div.innerHTML = `
      <img src="${data.avatar}">
      ${data.name}
    `;
    div.onclick = () => openPrivateChat(data.userId, data.name);

    contactsDiv.appendChild(div);
  });

  document.querySelector(".contact[data-id='global']").onclick = () => {
    openChat("global", "Global Chat");
  };
}

await loadContacts();

/* ----- CHAT SYSTEM ----- */
let currentChat = "global";

function chatPath(chatId) {
  return chatId === "global"
    ? collection(db, "globalMessages")
    : collection(db, "privateChats", chatId, "messages");
}

function openChat(chatId, name) {
  currentChat = chatId;
  document.getElementById("chatHeader").innerText = name;
  loadMessages(chatId);
}

function openPrivateChat(otherId, name) {
  const chatId = myId < otherId ? `${myId}_${otherId}` : `${otherId}_${myId}`;
  openChat(chatId, name);
}

function loadMessages(chatId) {
  const msgBox = document.getElementById("messages");
  msgBox.innerHTML = "";
  document.getElementById("typingIndicator").innerHTML = "";

  const q = query(chatPath(chatId), orderBy("time"));
  onSnapshot(q, snap => {
    msgBox.innerHTML = "";
    snap.forEach(d => {
      const m = d.data();
      const div = document.createElement("div");
      div.className = "message " + (m.senderId === myId ? "mine" : "theirs");
      div.textContent = m.text;
      msgBox.appendChild(div);
    });
    msgBox.scrollTop = msgBox.scrollHeight;
  });

  setupTypingListener(chatId);
}

/* ----- SEND MESSAGE ----- */
async function sendMessage() {
  const input = document.getElementById("messageInput");
  const text = input.value.trim();
  if (!text) return;

  await addDoc(chatPath(currentChat), {
    senderId: myId,
    senderName: myName,
    text: text,
    time: Date.now()
  });

  input.value = "";
  updateTyping(false);
}

document.getElementById("sendBtn").onclick = sendMessage;
document.getElementById("messageInput").addEventListener("keydown", e => {
  if (e.key === "Enter") {
    e.preventDefault();
    sendMessage();
  } else {
    updateTyping(true);
  }
});

/* ----- TYPING INDICATOR ----- */
let typingTimeout;

async function updateTyping(isTyping) {
  await setDoc(doc(db, "typing", currentChat + "_" + myId), {
    chatId: currentChat,
    userId: myId,
    name: myName,
    typing: isTyping,
    time: Date.now()
  }, { merge: true });

  clearTimeout(typingTimeout);
  if (isTyping) {
    typingTimeout = setTimeout(() => updateTyping(false), 2000);
  }
}

function setupTypingListener(chatId) {
  const typingDiv = document.getElementById("typingIndicator");
  typingDiv.innerHTML = "";

  onSnapshot(collection(db, "typing"), snap => {
    let someoneTyping = false;
    let name = "";

    snap.forEach(d => {
      const t = d.data();
      if (t.chatId === chatId && t.userId !== myId && t.typing) {
        someoneTyping = true;
        name = t.name;
      }
    });

    typingDiv.innerHTML = someoneTyping
      ? `${name} is typing <span class="typingBubble"></span><span class="typingBubble"></span><span class="typingBubble"></span>`
      : "";
  });
}

</script>
</body>
</html>
