<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>iMessage Chat</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  height: 100vh;
  display: flex;
  background: #f2f2f7;
}

/* ----- SIDEBAR ----- */
#sidebar {
  width: 320px;
  background: #fff;
  border-right: 1px solid #ddd;
  display: flex;
  flex-direction: column;
}

#profile {
  padding: 20px;
  display: flex;
  align-items: center;
  border-bottom: 1px solid #eee;
}

#profile img {
  width: 55px;
  height: 55px;
  border-radius: 50%;
  margin-right: 12px;
}

#editProfile {
  margin-top: 5px;
  font-size: 13px;
  color: #0a84ff;
  cursor: pointer;
}

#contacts {
  flex: 1;
  overflow-y: auto;
}

.contact {
  padding: 16px;
  display: flex;
  align-items: center;
  cursor: pointer;
  border-bottom: 1px solid #f4f4f4;
}

.contact:hover {
  background: #f0f0f0;
}

.contact img {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  margin-right: 12px;
}

/* ----- CHAT AREA ----- */
#chat {
  flex: 1;
  display: flex;
  flex-direction: column;
}

#chatHeader {
  padding: 15px;
  background: white;
  border-bottom: 1px solid #ddd;
  font-size: 20px;
  font-weight: 600;
}

#messages {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
}

.message {
  max-width: 70%;
  padding: 10px 14px;
  margin-bottom: 12px;
  border-radius: 18px;
  font-size: 15px;
  line-height: 1.3;
}

.mine {
  background: #0a84ff;
  color: white;
  margin-left: auto;
}

.theirs {
  background: #e5e5ea;
  color: black;
  margin-right: auto;
}

#inputBar {
  display: flex;
  padding: 10px;
  background: white;
  border-top: 1px solid #ddd;
}

#messageInput {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: 1px solid #ccc;
}

#sendBtn {
  margin-left: 10px;
  padding: 10px 16px;
  background: #0a84ff;
  border: none;
  border-radius: 18px;
  color: white;
  cursor: pointer;
  font-weight: 600;
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">

  <div id="profile">
    <img id="myAvatar" src="">
    <div>
      <div id="myName"></div>
      <small>ID: <span id="myId"></span></small>
      <div id="editProfile">Edit Profile</div>
    </div>
  </div>

  <div id="contacts">
    <div class="contact" data-id="global">
      <img src="https://i.imgur.com/2WZtODx.png">
      <div>🌐 Global Chat</div>
    </div>
  </div>

</div>

<!-- CHAT WINDOW -->
<div id="chat">
  <div id="chatHeader">Global Chat</div>
  <div id="messages"></div>

  <div id="inputBar">
    <input id="messageInput" placeholder="Message…" />
    <button id="sendBtn">Send</button>
  </div>
</div>

<!-- FIREBASE -->
<script type="module">

/* ---- FIREBASE IMPORTS ---- */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.5.2/firebase-app.js";
import { getFirestore, doc, setDoc, updateDoc, getDoc, collection, addDoc, onSnapshot, query, orderBy }
  from "https://www.gstatic.com/firebasejs/10.5.2/firebase-firestore.js";

/* ---- FIREBASE CONFIG ---- */
const firebaseConfig = {
  apiKey: "AIzaSyA8JyrfvNxf-l3dml5YoQouCmwsZwmhx8Q",
  authDomain: "chatbase-a68ee.firebaseapp.com",
  projectId: "chatbase-a68ee",
  storageBucket: "chatbase-a68ee.firebasestorage.app",
  messagingSenderId: "353773816946",
  appId: "1:353773816946:web:38d815c3e92ce6156b06eb",
  measurementId: "G-3D5QB7B2G3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ----- USER PROFILE SYSTEM ----- */
let myId = localStorage.getItem("myId");
let myName = localStorage.getItem("myName");
let myAvatar = localStorage.getItem("myAvatar");

async function setupUser() {
  if (!myId) {
    myId = "user_" + Math.random().toString(36).substring(2, 9);
    localStorage.setItem("myId", myId);
  }

  if (!myName) {
    myName = prompt("Enter display name:");
    localStorage.setItem("myName", myName);
  }

  if (!myAvatar) {
    myAvatar = "https://placekitten.com/200/" + Math.floor(Math.random()*100+200);
    localStorage.setItem("myAvatar", myAvatar);
  }

  await setDoc(doc(db, "users", myId), {
    userId: myId,
    name: myName,
    avatar: myAvatar,
    createdAt: Date.now()
  }, { merge: true });

  document.getElementById("myId").innerText = myId;
  document.getElementById("myName").innerText = myName;
  document.getElementById("myAvatar").src = myAvatar;
}

setupUser();

/* ----- EDIT PROFILE ----- */
document.getElementById("editProfile").onclick = async () => {
  const newName = prompt("New display name:", myName);
  if (!newName) return;

  myName = newName;
  localStorage.setItem("myName", newName);

  await updateDoc(doc(db, "users", myId), {
    name: newName
  });

  document.getElementById("myName").innerText = newName;
};

/* ----- CHAT SYSTEM ----- */
let currentChat = "global";
loadChat("global");

document.querySelectorAll(".contact").forEach(c => {
  c.onclick = () => {
    currentChat = c.dataset.id;
    loadChat(currentChat);
  };
});

function getChatCollection(chatId) {
  return chatId === "global"
    ? collection(db, "globalMessages")
    : collection(db, "privateChats", chatId, "messages");
}

function loadChat(chatId) {
  document.getElementById("messages").innerHTML = "";

  const q = query(getChatCollection(chatId), orderBy("time"));
  onSnapshot(q, snapshot => {
    const msgBox = document.getElementById("messages");
    msgBox.innerHTML = "";

    snapshot.forEach(doc => {
      const m = doc.data();
      const bubble = document.createElement("div");
      bubble.className = "message " + (m.senderId === myId ? "mine" : "theirs");
      bubble.textContent = m.text;
      msgBox.appendChild(bubble);
    });

    msgBox.scrollTop = msgBox.scrollHeight;
  });
}

document.getElementById("sendBtn").onclick = async () => {
  const text = document.getElementById("messageInput").value.trim();
  if (!text) return;

  await addDoc(getChatCollection(currentChat), {
    senderId: myId,
    senderName: myName,
    text: text,
    time: Date.now()
  });

  document.getElementById("messageInput").value = "";
};

</script>

</body>
</html>
