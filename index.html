<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chat</title>

<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: "Inter", sans-serif;
        background: #000;
        display: flex;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
    }

    #chat-container {
        width: 100%;
        max-width: 700px;
        height: 100vh;
        display: flex;
        flex-direction: column;
        background: #000;
    }

    #messages {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        scroll-behavior: smooth;
    }

    /* Message bubbles */
    .bubble {
        max-width: 75%;
        padding: 12px 16px;
        border-radius: 18px;
        font-size: 15px;
        line-height: 1.3;
        word-wrap: break-word;
        white-space: pre-wrap;
    }

    /* You (right side - blue bubble) */
    .me {
        align-self: flex-end;
        background: #007aff;
        color: white;
        border-bottom-right-radius: 4px;
    }

    /* Others (left side - gray bubble) */
    .them {
        align-self: flex-start;
        background: #2c2c2e;
        color: white;
        border-bottom-left-radius: 4px;
    }

    /* Username label above other users' messages */
    .username-label {
        font-size: 12px;
        color: #a7a7a7;
        margin-left: 4px;
        margin-bottom: -8px;
    }

    /* Bottom input bar */
    #input-bar {
        display: flex;
        padding: 12px;
        background: #111;
        gap: 10px;
        border-top: 1px solid #1c1c1e;
    }

    #username {
        position: absolute;
        top: 10px;
        left: 10px;
        width: calc(100% - 20px);
        padding: 10px;
        background: #111;
        border: 1px solid #333;
        border-radius: 10px;
        color: white;
    }

    #messageInput {
        flex: 1;
        padding: 14px;
        font-size: 15px;
        border-radius: 20px;
        border: none;
        background: #1c1c1e;
        color: white;
    }

    #sendBtn {
        padding: 0 20px;
        border-radius: 20px;
        border: none;
        background: #007aff;
        color: white;
        font-weight: 600;
        cursor: pointer;
        transition: 0.25s;
    }

    #sendBtn:hover {
        background: #0062cc;
    }

</style>
</head>

<body>
    <input id="username" placeholder="Your username..." />

    <div id="chat-container">
        <div id="messages"></div>

        <div id="input-bar">
            <input id="messageInput" placeholder="Message..." />
            <button id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { 
        getFirestore, collection, addDoc, serverTimestamp,
        query, orderBy, onSnapshot 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyA8JyrfvNxf-l3dml5YoQouCmwsZwmhx8Q",
      authDomain: "chatbase-a68ee.firebaseapp.com",
      projectId: "chatbase-a68ee",
      storageBucket: "chatbase-a68ee.firebasestorage.app",
      messagingSenderId: "353773816946",
      appId: "1:353773816946:web:38d815c3e92ce6156b06eb",
      measurementId: "G-3D5QB7B2G3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const messagesRef = collection(db, "messages");
    const q = query(messagesRef, orderBy("timestamp"));
    const messagesDiv = document.getElementById("messages");

    let myName = "";

    // Realtime update
    onSnapshot(q, (snapshot) => {
        messagesDiv.innerHTML = "";

        snapshot.forEach((doc) => {
            const data = doc.data();

            const isMe = (data.username === myName);

            if (!isMe) {
                // Show username for others
                const label = document.createElement("div");
                label.className = "username-label";
                label.textContent = data.username;
                messagesDiv.appendChild(label);
            }

            const bubble = document.createElement("div");
            bubble.className = "bubble " + (isMe ? "me" : "them");
            bubble.textContent = data.text;

            messagesDiv.appendChild(bubble);
        });

        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });

    // Send message
    window.sendMessage = async () => {
        const usernameInput = document.getElementById("username");
        const messageInput = document.getElementById("messageInput");

        myName = usernameInput.value.trim();
        const text = messageInput.value.trim();

        if (!myName || !text) return;

        await addDoc(messagesRef, {
            username: myName,
            text,
            timestamp: serverTimestamp()
        });

        messageInput.value = "";
    };
</script>

</body>
</html>
