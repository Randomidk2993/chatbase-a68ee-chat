<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>iMessage Chat</title>

<style>
/* ---------------- GLOBAL STYLE ---------------- */
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  height: 100vh;
  display: flex;
  background: #f2f2f7;
  overflow: hidden;
}

/* ---------------- SIDEBAR ---------------- */
#sidebar {
  width: 300px;
  background: #fff;
  border-right: 1px solid #ddd;
  display: flex;
  flex-direction: column;
}

#profile {
  padding: 20px;
  display: flex;
  align-items: center;
  border-bottom: 1px solid #eee;
}

#profile img {
  width: 55px;
  height: 55px;
  border-radius: 50%;
  margin-right: 12px;
  background: #e5e5ea;
}

#profileName {
  font-size: 18px;
  font-weight: 600;
}

#profileId {
  font-size: 12px;
  opacity: 0.6;
}

#editProfile {
  margin-top: 6px;
  color: #0a84ff;
  font-size: 13px;
  cursor: pointer;
}

#contacts {
  flex: 1;
  overflow-y: auto;
}

/* CONTACT ITEM */
.contact {
  padding: 14px;
  display: flex;
  align-items: center;
  cursor: pointer;
  border-bottom: 1px solid #f4f4f4;
}

.contact img {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  margin-right: 12px;
}

.contact:hover {
  background: #f0f0f0;
}

#addFriendBtn {
  padding: 15px;
  text-align: center;
  background: #f9f9f9;
  cursor: pointer;
  border-top: 1px solid #eee;
  color: #0a84ff;
  font-weight: 600;
}

/* ---------------- CHAT AREA ---------------- */
#chat {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: #f2f2f7;
}

#chatHeader {
  padding: 16px;
  background: white;
  border-bottom: 1px solid #ddd;
  font-size: 20px;
  font-weight: 600;
}

#messages {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
}

/* MESSAGE BUBBLES */
.message {
  max-width: 70%;
  padding: 10px 14px;
  margin-bottom: 12px;
  border-radius: 18px;
  font-size: 15px;
  line-height: 1.3;
}

.mine {
  background: #0a84ff;
  color: white;
  margin-left: auto;
}

.theirs {
  background: #e5e5ea;
  color: black;
  margin-right: auto;
}

/* TYPING INDICATOR */
.typing {
  font-size: 12px;
  opacity: 0.7;
  margin-bottom: 10px;
}

/* INPUT BAR */
#inputBar {
  display: flex;
  padding: 10px;
  background: white;
  border-top: 1px solid #ddd;
}

#messageInput {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: 1px solid #ccc;
}

#sendBtn {
  margin-left: 10px;
  padding: 10px 16px;
  background: #0a84ff;
  border: none;
  border-radius: 18px;
  color: white;
  cursor: pointer;
  font-weight: 600;
}

/* ADD FRIEND POPUP */
#friendPopup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  width: 320px;
  padding: 20px;
  border-radius: 18px;
  display: none;
  box-shadow: 0 10px 40px rgba(0,0,0,0.25);
}

#friendPopup input {
  width: 100%;
  padding: 10px;
  border-radius: 14px;
  border: 1px solid #ccc;
  margin-bottom: 10px;
}

#friendPopup button {
  width: 100%;
  padding: 12px;
  background: #0a84ff;
  border: none;
  color: white;
  font-size: 15px;
  border-radius: 14px;
  cursor: pointer;
}

#closePopup {
  text-align: center;
  margin-top: 10px;
  cursor: pointer;
  color: #666;
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div id="profile">
    <img id="myAvatar">
    <div>
      <div id="profileName"></div>
      <div id="profileId"></div>
      <div id="editProfile">Edit Profile</div>
    </div>
  </div>

  <div id="contacts">
    <div class="contact" data-id="global">
      <img src="https://i.imgur.com/2WZtODx.png">
      <div>🌐 Global Chat</div>
    </div>
  </div>

  <div id="addFriendBtn">+ Add Friend</div>
</div>

<!-- CHAT WINDOW -->
<div id="chat">
  <div id="chatHeader">Global Chat</div>
  <div id="messages"></div>

  <div id="inputBar">
    <input id="messageInput" placeholder="Message…" />
    <button id="sendBtn">Send</button>
  </div>
</div>

<!-- ADD FRIEND POPUP -->
<div id="friendPopup">
  <h3>Add Friend</h3>
  <input id="friendIdInput" placeholder="Friend ID">
  <button id="sendRequestBtn">Send Friend Request</button>
  <div id="closePopup">Cancel</div>
</div>


<!-- FIREBASE CODE -->
<script type="module">
/* ---------------- IMPORTS ---------------- */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.5.2/firebase-app.js";
import { 
  getAuth, onAuthStateChanged, signInAnonymously, GoogleAuthProvider, signInWithPopup 
} from "https://www.gstatic.com/firebasejs/10.5.2/firebase-auth.js";

import { 
  getFirestore, doc, setDoc, updateDoc, getDoc, collection, addDoc, onSnapshot, query, orderBy, getDocs 
} from "https://www.gstatic.com/firebasejs/10.5.2/firebase-firestore.js";

import {
  getStorage, ref, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.5.2/firebase-storage.js";

/* ---------------- FIREBASE CONFIG ---------------- */
const firebaseConfig = {
  apiKey: "AIzaSyA8JyrfvNxf-l3dml5YoQouCmwsZwmhx8Q",
  authDomain: "chatbase-a68ee.firebaseapp.com",
  projectId: "chatbase-a68ee",
  storageBucket: "chatbase-a68ee.firebasestorage.app",
  messagingSenderId: "353773816946",
  appId: "1:353773816946:web:38d815c3e92ce6156b06eb",
  measurementId: "G-3D5QB7B2G3"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

/* ---------------- GLOBALS ---------------- */
let uid = null;
let myName = "";
let myAvatar = "";
let currentChat = "global";

/* ---------------- AUTO LOGIN ---------------- */
onAuthStateChanged(auth, async user => {
  if (!user) await signInAnonymously(auth);
  uid = auth.currentUser.uid;
  await loadProfile();
  loadContacts();
  loadChat("global");
});

/* ---------------- LOAD / CREATE PROFILE ---------------- */
async function loadProfile() {
  const userDoc = doc(db, "users", uid);
  const snap = await getDoc(userDoc);

  if (!snap.exists()) {
    myName = "User" + Math.floor(Math.random() * 9999);
    myAvatar = "https://placekitten.com/200/" + Math.floor(Math.random() * 50 + 200);

    await setDoc(userDoc, {
      userId: uid,
      name: myName,
      avatar: myAvatar,
      createdAt: Date.now()
    });
  } else {
    myName = snap.data().name;
    myAvatar = snap.data().avatar;
  }

  document.getElementById("profileName").innerText = myName;
  document.getElementById("profileId").innerText = "ID: " + uid;
  document.getElementById("myAvatar").src = myAvatar;
}

/* ---------------- UPDATE PROFILE ---------------- */
document.getElementById("editProfile").onclick = async () => {
  const newName = prompt("New display name:", myName);
  if (!newName) return;

  myName = newName;
  await updateDoc(doc(db, "users", uid), { name: newName });
  document.getElementById("profileName").innerText = newName;
};

/* ---------------- ADD FRIEND POPUP ---------------- */
document.getElementById("addFriendBtn").onclick = () => {
  document.getElementById("friendPopup").style.display = "block";
};

document.getElementById("closePopup").onclick = () => {
  document.getElementById("friendPopup").style.display = "none";
};

/* ---------------- SEND FRIEND REQUEST ---------------- */
document.getElementById("sendRequestBtn").onclick = async () => {
  const friendId = document.getElementById("friendIdInput").value.trim();
  if (!friendId || friendId === uid) {
    alert("Invalid friend ID");
    return;
  }

  await addDoc(collection(db, "friendRequests"), {
    from: uid,
    to: friendId,
    status: "pending",
    time: Date.now()
  });

  alert("Friend request sent!");
  document.getElementById("friendPopup").style.display = "none";
};

/* ---------------- LOAD CONTACTS ---------------- */
async function loadContacts() {
  const contactsDiv = document.getElementById("contacts");

  // keep Global Chat at top
  contactsDiv.innerHTML = `
    <div class="contact" data-id="global">
      <img src="https://i.imgur.com/2WZtODx.png">
      <div>🌐 Global Chat</div>
    </div>
  `;

  const q = query(collection(db, "users"));
  const snap = await getDocs(q);

  snap.forEach(u => {
    if (u.id === uid) return; // skip self
    const d = u.data();

    const div = document.createElement("div");
    div.className = "contact";
    div.dataset.id = u.id;
    div.innerHTML = `
      <img src="${d.avatar}">
      <div>${d.name}</div>
    `;
    div.onclick = () => loadChat(u.id);
    contactsDiv.appendChild(div);
  });
}

/* ---------------- CHAT LOADING ---------------- */
function getChatCollection(chatId) {
  return chatId === "global"
    ? collection(db, "globalMessages")
    : collection(db, "privateChats", [uid, chatId].sort().join("_"), "messages");
}

function loadChat(chatId) {
  currentChat = chatId;
  const chatHeader = document.getElementById("chatHeader");
  const messagesDiv = document.getElementById("messages");
  messagesDiv.innerHTML = "";

  chatHeader.innerText = chatId === "global" ? "Global Chat" : "Chat with " + chatId;

  const q = query(getChatCollection(chatId), orderBy("time"));
  onSnapshot(q, snapshot => {
    messagesDiv.innerHTML = "";
    snapshot.forEach(doc => {
      const m = doc.data();
      const div = document.createElement("div");
      div.className = "message " + (m.senderId === uid ? "mine" : "theirs");
      div.innerText = m.text;
      messagesDiv.appendChild(div);
    });
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  });
}

/* ---------------- SEND MESSAGE ---------------- */
document.getElementById("sendBtn").onclick = sendMessage;
document.getElementById("messageInput").addEventListener("keydown", e => {
  if (e.key === "Enter") sendMessage();
});

async function sendMessage() {
  const msg = document.getElementById("messageInput").value.trim();
  if (!msg) return;

  await addDoc(getChatCollection(currentChat), {
    senderId: uid,
    senderName: myName,
    text: msg,
    time: Date.now()
  });

  document.getElementById("messageInput").value = "";
}

</script>

</body>
</html>
