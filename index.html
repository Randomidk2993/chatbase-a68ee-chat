<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chat</title>

<!-- Modern Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: "Inter", sans-serif;
        background: #0f0f0f;
        display: flex;
        justify-content: center;
    }

    #chat-wrapper {
        width: 100%;
        max-width: 480px;
        margin-top: 40px;
        padding: 20px;
    }

    #chat-box {
        background: rgba(35, 35, 35, 0.9);
        backdrop-filter: blur(10px);
        border-radius: 14px;
        padding: 20px;
        box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    h2 {
        margin-top: 0;
        text-align: center;
        color: #ffffff;
        font-weight: 600;
        margin-bottom: 15px;
    }

    #username {
        width: 100%;
        padding: 12px;
        font-size: 15px;
        border-radius: 10px;
        border: 1px solid #2e2e2e;
        background: #1c1c1c;
        color: white;
        margin-bottom: 15px;
    }

    #messages {
        height: 360px;
        overflow-y: auto;
        padding-right: 6px;
    }

    .msg {
        background: #1e1e1e;
        padding: 12px 14px;
        border-radius: 10px;
        margin-bottom: 10px;
        border: 1px solid #2b2b2b;
    }

    .username {
        color: #4da3ff;
        font-weight: 600;
        font-size: 14px;
        margin-bottom: 3px;
        display: block;
    }

    .text {
        font-size: 15px;
        color: #e7e7e7;
        white-space: pre-wrap;
        line-height: 1.35;
    }

    #input-area {
        display: flex;
        margin-top: 15px;
        gap: 10px;
    }

    #messageInput {
        flex: 1;
        padding: 13px;
        border-radius: 10px;
        background: #1c1c1c;
        border: 1px solid #2e2e2e;
        color: white;
        font-size: 15px;
    }

    button {
        padding: 0 22px;
        background: #4da3ff;
        border: none;
        border-radius: 10px;
        color: white;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        background: #2f8ce0;
    }
</style>
</head>

<body>
<div id="chat-wrapper">
    <div id="chat-box">
        <h2>Live Chat</h2>

        <input id="username" placeholder="Your username..." />

        <div id="messages"></div>

        <div id="input-area">
            <input id="messageInput" placeholder="Message..." />
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { 
        getFirestore, collection, addDoc, serverTimestamp,
        query, orderBy, onSnapshot 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // --- YOUR FIREBASE CONFIG ---
    const firebaseConfig = {
      apiKey: "AIzaSyA8JyrfvNxf-l3dml5YoQouCmwsZwmhx8Q",
      authDomain: "chatbase-a68ee.firebaseapp.com",
      projectId: "chatbase-a68ee",
      storageBucket: "chatbase-a68ee.firebasestorage.app",
      messagingSenderId: "353773816946",
      appId: "1:353773816946:web:38d815c3e92ce6156b06eb",
      measurementId: "G-3D5QB7B2G3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const messagesRef = collection(db, "messages");
    const q = query(messagesRef, orderBy("timestamp"));

    const messagesDiv = document.getElementById("messages");

    // Live updates
    onSnapshot(q, (snapshot) => {
        messagesDiv.innerHTML = "";
        snapshot.forEach((doc) => {
            const data = doc.data();

            const msg = document.createElement("div");
            msg.className = "msg";
            msg.innerHTML = `
                <span class="username">${data.username}</span>
                <span class="text">${data.text}</span>
            `;

            messagesDiv.appendChild(msg);
        });

        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });

    // Send message
    window.sendMessage = async () => {
        const username = document.getElementById("username").value.trim();
        const text = document.getElementById("messageInput").value.trim();

        if (!username || !text) return;

        await addDoc(messagesRef, {
            username,
            text,
            timestamp: serverTimestamp()
        });

        document.getElementById("messageInput").value = "";
    };
</script>

</body>
</html>
